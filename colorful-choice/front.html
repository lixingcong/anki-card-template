<div class="question">{{id}}.&nbsp;{{question}}<span id="questionType"></span></div>
<div class="options" id="options"></div>

<div>
    {{#notes}}
    <span id="showNotes" onclick="showNotes(true)" class="small-btn">⊙</span>
    {{/notes}}
    <span onclick="resetSelected()" class="small-btn float-right">♫</span>
</div>

{{#notes}}
<div id="notes" class="invisible"></div>
{{/notes}}

<div id="tags" class="tags"></div>

<code class="invisible" id="original-options">{{options}}</code>
<code class="invisible" id="original-tags">{{Tags}}</code>
<code class="invisible" id="original-notes">{{#notes}}{{notes}}{{/notes}}</code>
<code class="invisible" id="original-answer">{{answer}}</code>

<script type="text/javascript">
    var cs = new CardStorageColorfulChoice()

    cs.build(takeContent('original-options'), takeContent('original-answer'), takeContent('original-notes'))

    init_options(true)
    show_tags(takeContent('original-tags'), 'tags', 'tag')
    setInnerHtml('notes', cs.notes)

    if(is_mobile){
        window.onunload = function() {
            if (Persistence.isAvailable())
                Persistence.setItem(cs)
        }
    }

    function showNotes(b){
        let eleShow = document.getElementById('notes')
        let eleHide = document.getElementById('showNotes')
        if(!b)
            [eleHide, eleShow] = [eleShow, eleHide]

        if(eleShow)
            eleShow.classList.remove('invisible')

        if(eleHide)
            eleHide.classList.add('invisible')
    }

    function resetSelected(){
        showNotes(false)
        cs.reset_selected()
        redraw_selected()
    }

    if(undefined !== keyChecker)
        keyChecker.uninstall()

    var keyChecker= new EventHistoryTimer(['keydown'], 20)
    keyChecker.install(function(e){
        if(e.ctrlKey && e.altKey && e.key.length == 1){
            const idx = e.key.charCodeAt(0) - 49
            if(idx>=0 && idx<cs.options_text.length)
                toggle(idx)
        }
    })
</script>
