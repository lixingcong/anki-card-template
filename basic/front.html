{{Front}}

{{#Reference}}
<div>
    <span id="showRefBtn" onclick="showReference(true)" class="small-btn">⊙</span>
    <span onclick="showReference(false)" class="small-btn float-right">♫</span>
</div>
<div id="reference" class="reference invisible">{{Reference}}</div>
{{/Reference}}


<div id="tags" class="tags"></div>

<code class="invisible" id="original-tags">{{Tags}}</code>

<script type="text/javascript">
    show_tags(takeContent('original-tags'), 'tags', 'tag')

    function showReference(b){
        let eleShow = document.getElementById('reference')
        let eleHide = document.getElementById('showRefBtn')
        if(!b)
            [eleHide, eleShow] = [eleShow, eleHide]

        if(eleShow)
            eleShow.classList.remove('invisible')

        if(eleHide)
            eleHide.classList.add('invisible')
    }
</script>
