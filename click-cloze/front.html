<div id="content-div"></div>

<hr>
<div>
    {{#notes}}
    <span id="showNotes" onclick="showNotes(true)" class="small-btn">⊙</span>
    {{/notes}}
    <span onclick="resetCloze()" class="small-btn float-right">♫</span>
</div>

{{#notes}}
<div id="notes" class="invisible">{{notes}}</div>
{{/notes}}

<div id="tags" class="tags"></div>

<code class="invisible" id="original-content">{{content}}</code>
<code class="invisible" id="original-tags">{{Tags}}</code>

<script type="text/javascript">
    var cs = new CardStorageClickCloze()
    cs.build(takeContent('original-content'))

    show_result(false)
    show_tags(takeContent('original-tags'), 'tags', 'tag')

    if(is_mobile){
        window.onunload = function() {
            if (Persistence.isAvailable())
                Persistence.setItem(cs)
        }
    }

    function showNotes(b){
        let eleShow = document.getElementById('notes')
        let eleHide = document.getElementById('showNotes')
        if(!b)
            [eleHide, eleShow] = [eleShow, eleHide]

        if(eleShow)
            eleShow.classList.remove('invisible')

        if(eleHide)
            eleHide.classList.add('invisible')
    }

    function resetCloze(){
        showNotes(false)
        for(let i=0;i<cs.clickClozeCount;++i)
            showClozeAnswer(i, false)
        ClickedClozeIndex = 0
    }

    if(undefined !== keyChecker)
        keyChecker.uninstall()

    var keyChecker= new EventHistoryTimer(['keydown'], 20)
    keyChecker.install(function(e){
        if(e.ctrlKey && e.altKey){
            let show
            let forward
            if('1'==e.key)
                show = true
            else if('2'==e.key)
                show = false
            else if('3'==e.key)
                forward=true
            else if('4'==e.key)
                forward=false

            if(undefined !== show){
                showClozeAnswerByStep(show)
                return true
            }

            if(undefined !== forward){
                selectClozeByStep(forward)
                return true
            }
        }
        return false
    })
</script>
